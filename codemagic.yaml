# Codemagic CI/CD — Kare Kare
# Android AAB + APK üretir (imzalı). iOS workflow hazır ama Apple kimlik
# doğrulaması onaylanınca aktifleştirilecek (App Store Connect entegrasyonu).

workflows:
  android-release:
    name: Android Release (AAB + APK)
    instance_type: mac_mini_m2   # ücretsiz plan uyumlu
    max_build_duration: 60
    environment:
      flutter: stable
      android_signing:
        - kare_kare_upload        # Codemagic'te oluşturulacak keystore referansı
      vars:
        PACKAGE_NAME: "com.karekare.karekare"
    scripts:
      - name: Flutter paketleri
        script: flutter packages pub get
      - name: Testler
        script: flutter test
      - name: AAB (Play Store)
        script: flutter build appbundle --release
      - name: APK (telefon testi)
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/bundle/**/*.aab
      - build/**/outputs/apk/**/*.apk
      - build/**/outputs/**/mapping.txt
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal

  ios-release:
    name: iOS Release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    integrations:
      app_store_connect: codemagic   # Codemagic'teki ASC entegrasyon adı
    environment:
      flutter: stable
      groups:
        - ios_signing   # Codemagic'te CERTIFICATE_PRIVATE_KEY içeren grup
      vars:
        BUNDLE_ID: "com.karekare.karekare"
    scripts:
      - name: Swift Package Manager'ı kapat (CocoaPods'a zorla)
        script: flutter config --no-enable-swift-package-manager
      - name: Flutter paketleri
        script: flutter packages pub get
      - name: Kod imzalama (kalıcı anahtarla sertifika + profil)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: IPA build
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s) / 60)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

